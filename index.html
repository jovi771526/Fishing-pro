<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RIMA PRO AI PESCA</title>

<!-- LEAFLET OK -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; }
#map { height:100vh; }

.panel {
 position: fixed;
 top: 15px;
 left: 15px;
 right: 15px;
 background: rgba(0,0,0,0.8);
 color: white;
 padding: 15px;
 border-radius: 15px;
 font-family: Arial;
 z-index:1000;
}

button {
 margin-top:10px;
 width:100%;
 padding:12px;
 border:none;
 border-radius:10px;
 background:#00c853;
 color:white;
 font-size:16px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
🌊 Marea: 0.36 m<br>
🌡 Temp: 13.7°C<br>
💨 Vento: 4 km/h<br>
🧭 Direzione: 63°<br>
🎣 Score: 90/100<br>
📍 Spot: Foce Livenza 🔥

<button onclick="goToLocation()">📍 Vai alla mia posizione</button>
</div>

<!-- SCRIPT LEAFLET -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// CONTROLLO SICUREZZA
if (typeof L === "undefined") {
  alert("Errore: Leaflet non caricato");
}

// MAPPA
var map = L.map('map').setView([45.5869, 12.8650], 13);

// TILE
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
 attribution: '© OpenStreetMap'
}).addTo(map);

// 🔥 FOCE LIVENZA
L.marker([45.5869, 12.8650]).addTo(map)
.bindPopup("🔥 Foce Livenza");

// 🧱 DIGA LEVANTE
L.marker([45.5865, 12.8685]).addTo(map)
.bindPopup("Diga Levante");

// 🧱 DIGA PONENTE CORRETTA
L.marker([45.5867, 12.8589]).addTo(map)
.bindPopup("Diga Ponente");

// 📍 GEOLOCALIZZAZIONE
function goToLocation(){
 navigator.geolocation.getCurrentPosition(function(pos){
   var lat = pos.coords.latitude;
   var lon = pos.coords.longitude;

   map.setView([lat, lon], 14);

   L.marker([lat, lon]).addTo(map)
   .bindPopup("📍 Sei qui").openPopup();
 });
}

</script>

</body>
</html>
