<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RIMA PRO AI Pesca</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin:0;
  font-family: Arial;
}

#map {
  height:100vh;
}

/* PANNELLO PRO */
.panel {
  position:fixed;
  top:15px;
  left:15px;
  right:15px;
  background:rgba(0,0,0,0.75);
  color:white;
  padding:15px;
  border-radius:15px;
  backdrop-filter: blur(10px);
  z-index:1000;
}

.btn {
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00c853;
  color:white;
  font-size:16px;
}

</style>
</head>

<body>

<div id="map"></div>

<div class="panel" id="panel">
  🌊 Marea: <span id="tide">--</span><br>
  🌡️ Temp: <span id="temp">--</span><br>
  💨 Vento: <span id="wind">--</span><br>
  🧭 Direzione: <span id="dir">--</span><br>
  🎣 Score: <span id="score">--</span><br>
  📍 Spot: <span id="spot">--</span>

  <button class="btn" onclick="goToUser()">📍 Vai alla mia posizione</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// MAPPA
var map = L.map('map').setView([45.596, 12.876], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'© OpenStreetMap'
}).addTo(map);


// 📍 SPOT CORRETTI (VERIFICATI)
var spots = [

  {
    name:"Foce Livenza",
    coords:[45.6005, 12.8870]
  },

  {
    name:"Diga Ponente",
    coords:[45.5970, 12.8615] // ✔ corretto
  },

  {
    name:"Diga Levante",
    coords:[45.6025, 12.8855]
  },

  {
    name:"Canale Laguna",
    coords:[45.6085, 12.9050] // ✔ dentro laguna
  }

];


// MARKER
spots.forEach(s => {
  L.marker(s.coords).addTo(map)
    .bindPopup(s.name);
});


// 📍 GEOLOCALIZZAZIONE
function goToUser(){
  navigator.geolocation.getCurrentPosition(pos=>{
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    map.setView([lat, lon], 14);

    L.marker([lat, lon]).addTo(map)
      .bindPopup("Sei qui")
      .openPopup();

  }, ()=>{
    alert("Geolocalizzazione non attiva");
  });
}


// 🤖 AI PESCA (logica smart base)
function calculateScore(temp, wind){

  let score = 50;

  if(temp > 10 && temp < 20) score += 20;
  if(wind < 10) score += 20;
  if(temp > 25) score -= 10;

  return Math.min(score,100);
}


// 🌍 METEO REALE (API gratuita)
async function loadWeather(){

  let lat = 45.596;
  let lon = 12.876;

  let url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`;

  let res = await fetch(url);
  let data = await res.json();

  let temp = data.current_weather.temperature;
  let wind = data.current_weather.windspeed;
  let dir = data.current_weather.winddirection;

  // MAREA FAKE (simulazione AI)
  let tide = (Math.random()*0.5).toFixed(2);

  let score = calculateScore(temp, wind);

  // Aggiorna UI
  document.getElementById("tide").innerText = tide + " m";
  document.getElementById("temp").innerText = temp + "°C";
  document.getElementById("wind").innerText = wind + " km/h";
  document.getElementById("dir").innerText = dir + "°";
  document.getElementById("score").innerText = score + "/100";
  document.getElementById("spot").innerText = "Foce Livenza 🔥";

}

loadWeather();

</script>

</body>
</html>
