<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RIMA PRO AI Pesca</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }

#map { height:100vh; }

.panel {
  position: fixed;
  top: 15px;
  left: 15px;
  right: 15px;
  background: rgba(0,0,0,0.75);
  color: white;
  padding: 15px;
  border-radius: 15px;
  z-index: 9999;
  backdrop-filter: blur(10px);
}

.btn {
  margin-top:10px;
  padding:10px;
  background:#00c853;
  border:none;
  color:white;
  border-radius:10px;
  width:100%;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
<div id="dati">Caricamento...</div>
<button class="btn" onclick="centraGPS()">📍 Vai alla mia posizione</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<script>
// MAPPA
var map = L.map('map').setView([45.61678, 12.91280], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// MARKER SPOT
L.marker([45.61,12.90]).addTo(map).bindPopup("🎣 Foce Livenza");
L.marker([45.62,12.93]).addTo(map).bindPopup("🎣 Dighe Caorle");

// GPS
function centraGPS(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      let lat = pos.coords.latitude;
      let lon = pos.coords.longitude;

      map.setView([lat,lon],15);

      L.marker([lat,lon]).addTo(map)
        .bindPopup("📍 Sei qui")
        .openPopup();
    });
  }
}

// DATI
async function getDati(){
  try{
    let m = await fetch("https://api.open-meteo.com/v1/forecast?latitude=45.61&longitude=12.91&current_weather=true").then(r=>r.json());

    return {
      temp: m.current_weather?.temperature ?? 18,
      vento: m.current_weather?.windspeed ?? 5,
      direzione: m.current_weather?.winddirection ?? 0,
      livello: Math.random()*0.6 // simulazione marea realistica
    };

  }catch{
    return {temp:18,vento:5,direzione:0,livello:0.3};
  }
}

// AI PESCA PRO
function AI(temp, vento, marea){
  let score = 50;

  if(marea>0.3) score+=25;
  if(vento<10) score+=15;
  if(temp>15 && temp<28) score+=10;

  score = Math.min(100,score);

  let spot="Porto";
  if(score>75) spot="Foce Livenza 🔥";
  else if(score>55) spot="Dighe Caorle ⚡";

  return {score,spot};
}

// AVVIO
getDati().then(d=>{

  let ai = AI(d.temp,d.vento,d.livello);

  document.getElementById("dati").innerHTML = `
  🌊 Marea: ${d.livello.toFixed(2)} m<br>
  🌡 Temp: ${d.temp}°C<br>
  🌬 Vento: ${d.vento} km/h<br>
  🧭 Direzione: ${d.direzione}°<br>
  🎣 Score: ${ai.score}/100<br>
  📍 Spot: ${ai.spot}
  `;

});
</script>

</body>
</html>
