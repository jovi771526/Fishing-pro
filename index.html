<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RIMA PRO AI PESCA</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; }
#map { height:100vh; }

.panel {
 position: fixed;
 top: 15px;
 left: 15px;
 right: 15px;
 background: rgba(0,0,0,0.8);
 color: white;
 padding: 15px;
 border-radius: 15px;
 font-family: Arial;
}

button {
 margin-top:10px;
 width:100%;
 padding:12px;
 border:none;
 border-radius:10px;
 background:#00c853;
 color:white;
 font-size:16px;
}

/* frecce corrente */
.current {
 position:absolute;
 font-size:20px;
 animation: move 3s linear infinite;
}

@keyframes move {
 0% { transform: translateY(0px); opacity:1;}
 100% { transform: translateY(40px); opacity:0;}
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
🌊 Marea: 0.36 m<br>
🌡 Temp: 13.7°C<br>
💨 Vento: 4 km/h<br>
🧭 Direzione: 63°<br>
🎣 Score: 90/100<br>
📍 Spot: Foce Livenza 🔥

<button onclick="goToLocation()">📍 Vai alla mia posizione</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// MAPPA
var map = L.map('map').setView([45.5869, 12.8650], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
 attribution: '© OpenStreetMap'
}).addTo(map);

// 🔥 SPOT REALI

// FOCE LIVENZA
L.marker([45.5869, 12.8650]).addTo(map)
.bindPopup("🔥 Foce Livenza (TOP pesca)");

// DIGA LEVANTE
L.marker([45.5865, 12.8685]).addTo(map)
.bindPopup("🧱 Diga Levante");

// DIGA PONENTE
L.marker([45.5865, 12.8615]).addTo(map)
.bindPopup("🧱 Diga Ponente");

// TEGNÙE (offshore)
L.marker([45.5700, 12.9500]).addTo(map)
.bindPopup("🌊 Tegnùe (spot offshore)");

// CANALE LAGUNA
L.marker([45.6000, 12.8800]).addTo(map)
.bindPopup("🐟 Canale laguna");

// 📍 GEOLOCALIZZAZIONE
function goToLocation(){
 navigator.geolocation.getCurrentPosition(function(pos){
   var lat = pos.coords.latitude;
   var lon = pos.coords.longitude;

   map.setView([lat, lon], 14);

   L.marker([lat, lon]).addTo(map)
   .bindPopup("📍 Sei qui").openPopup();
 });
}

// 🌊 CORRENTI (simulazione visiva)
function createCurrent(lat, lon){
 let el = document.createElement("div");
 el.className = "current";
 el.innerHTML = "➡️";

 let marker = L.marker([lat, lon], {
   icon: L.divIcon({
     className: '',
     html: el,
     iconSize: [20,20]
   })
 }).addTo(map);
}

// aggiunge correnti vicino foce
for(let i=0;i<10;i++){
 let lat = 45.586 + (Math.random()*0.01);
 let lon = 12.86 + (Math.random()*0.02);
 createCurrent(lat, lon);
}

</script>

</body>
</html>
